<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Material Design</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="styles/register.css">
</head>

<body>

    <div class="materialContainer">
        <div class="box">
            <div class="title">REGISTER</div>

            <form>
                <div class="name-group">
                    <div class="input">
                        <input type="text" id="fname" placeholder=" " required>
                        <label for="fname">Firstname</label>
                        <span class="spin"></span>
                    </div>
                    <div class="input">
                        <input type="text" id="lname" placeholder=" " required>
                        <label for="lname">Lastname</label>
                        <span class="spin"></span>
                    </div>
                </div>

                <div class="input">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">Email</label>
                    <span class="spin"></span>
                </div>

                <div class="input">
                    <input type="password" id="pwd" placeholder=" " required>
                    <label for="pwd">Password</label>
                    <span class="spin"></span>
                    <p class="password-hint">8+ chars, mix of letters & numbers</p>
                </div>

                <div class="button register">
                    <button type="submit">
                        <span>Register</span>
                    </button>
                </div>
            </form>

            <div class="footer-links">
                Already have an account? <a href="login.html">Sign in here</a>
            </div>

            <div class="terms">
                By continuing, you confirm you are 18 or over and agree to our
                <a href="#" class="muted">Privacy Policy</a> and <a href="#" class="muted">Terms of Use</a>.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/supabase-init.js"></script>
    <script type="module" src="scripts/pages/register.js"></script>
</body>

</html>
